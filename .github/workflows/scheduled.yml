name: scheduled

on:
  schedule:
    # 每天 09:00 UTC（约北京 17:00）
    - cron: "13 9 * * *"
    # 每周一 03:00 UTC
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  daily-structure-audit:
    name: Daily structure audit
    if: github.event.schedule == '13 9 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "Required files check (manifest: .github/required-files.txt)"
        run: |
          set -e
          if [ ! -f .github/required-files.txt ]; then
            echo "MISSING<<EOF" >> $GITHUB_ENV
            echo "- .github/required-files.txt (清单本身缺失)" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
            exit 0
          fi
          mapfile -t required < <(grep -vE '^\s*(#|$)' .github/required-files.txt)
          missing=()
          for f in "${required[@]}"; do
            [ ! -e "$f" ] && missing+=("$f")
          done
          if [ ${#missing[@]} -gt 0 ]; then
            printf -- "- %s\n" "${missing[@]}" > /tmp/missing.txt
            echo "MISSING<<EOF" >> $GITHUB_ENV
            cat /tmp/missing.txt >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi
      - name: Open issue if missing
        if: env.MISSING != ''
        uses: actions/github-script@v7
        with:
          script: |
            const missing = process.env.MISSING;
            const today = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[scheduled] ${today} 必需文件缺失`,
              body: `每日结构自检发现以下文件缺失：\n\n${missing}\n\n详见 [.github/workflows/scheduled.yml](../blob/main/.github/workflows/scheduled.yml)`,
              labels: ['harness-health', 'auto-generated']
            });

  weekly-stale-check:
    name: Weekly stale-check
    if: github.event.schedule == '17 3 * * 1' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute stale signals
        id: signals
        run: |
          set -e
          last_commit_ts=$(git log -1 --pretty=%ct main)
          now_ts=$(date +%s)
          days_since=$(( (now_ts - last_commit_ts) / 86400 ))
          echo "days_since_main_commit=$days_since" >> $GITHUB_OUTPUT
      - name: Open issue if stale
        if: steps.signals.outputs.days_since_main_commit > 7
        uses: actions/github-script@v7
        with:
          script: |
            const days = '${{ steps.signals.outputs.days_since_main_commit }}';
            const today = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[scheduled] ${today} 仓库 ${days} 天无 main 提交`,
              body: `main 分支已 ${days} 天无新 commit。\n\n如果是有意停滞（如等设计），关掉本 issue 即可。\n如果只是漏了 push，建议跑 \`/audit-practices\` + \`/sync-docs\` 后再决定。`,
              labels: ['harness-health', 'auto-generated', 'stale']
            });

  weekly-tool-versions:
    name: Weekly tool drift check
    if: github.event.schedule == '17 3 * * 1' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Compare locked vs latest prettier
        id: pretty
        run: |
          set -e
          locked=$(node -p "require('./package.json').devDependencies.prettier || require('./package.json').dependencies?.prettier || ''" | tr -d "^~")
          latest=$(npm view prettier@^3 version 2>/dev/null | tail -1 | tr -d "'")
          echo "locked_prettier=$locked" >> $GITHUB_OUTPUT
          echo "latest_prettier=$latest" >> $GITHUB_OUTPUT
          echo "Locked: $locked  |  Latest 3.x: $latest"
          if [ -n "$locked" ] && [ -n "$latest" ] && [ "$locked" != "$latest" ]; then
            echo "drift=true" >> $GITHUB_OUTPUT
          else
            echo "drift=false" >> $GITHUB_OUTPUT
          fi
      - name: Open issue if drifted
        if: steps.pretty.outputs.drift == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const locked = '${{ steps.pretty.outputs.locked_prettier }}';
            const latest = '${{ steps.pretty.outputs.latest_prettier }}';
            const today = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[scheduled] ${today} prettier 版本漂移 ${locked} → ${latest}`,
              body: `package.json 锁定 prettier@\`${locked}\`，npm 最新 3.x 是 \`${latest}\`。\n\n如确认升级：\n\n\`\`\`bash\nnpm i -D -E prettier@${latest}\nnpx prettier --write .\ngit commit -am "chore: bump prettier to ${latest}"\n\`\`\`\n\n如保持锁定，关闭本 issue 即可。`,
              labels: ['harness-health', 'auto-generated', 'tool-drift']
            });

  weekly-audit-reminder:
    name: Weekly audit-log reminder
    if: github.event.schedule == '17 3 * * 1' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Open weekly reminder issue
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[scheduled] ${today} 本周 audit log 摘要待审`,
              body: `**.audit.log 是本地 .gitignored 文件**，CI 看不到。请在本机跑：\n\n` +
                    `\`\`\`bash\n` +
                    `python .claude/scripts/audit-log-summary.py --tail 200\n` +
                    `python .claude/scripts/audit-log-summary.py --bypass\n` +
                    `python .claude/scripts/audit-log-summary.py --by-hook --by-action\n` +
                    `\`\`\`\n\n` +
                    `**审查重点**：\n` +
                    `- bypass 次数：上周是否非零？若是，每次是否有正当理由？\n` +
                    `- deny / ask_user 高频项：是否暗示规则过紧或工作流不顺？\n` +
                    `- SubagentStop 非 ok 状态：哪些 agent 频繁 degraded / escalate？\n\n` +
                    `审完关掉本 issue。如发现需修补规则，开新 issue 并附 audit.log 行号。`,
              labels: ['harness-health', 'auto-generated', 'audit-review']
            });
