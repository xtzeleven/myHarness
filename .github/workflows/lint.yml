name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  format-check:
    name: Prettier format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install pinned prettier
        run: npm ci
      - name: Run prettier --check
        run: npm run format:check

  structure-check:
    name: Project structure sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Required files exist
        run: |
          set -e
          if [ ! -f .github/required-files.txt ]; then
            echo "::error file=.github/required-files.txt::manifest is missing"
            exit 1
          fi
          mapfile -t required < <(grep -vE '^\s*(#|$)' .github/required-files.txt)
          missing=0
          for f in "${required[@]}"; do
            if [ ! -e "$f" ]; then
              echo "::error file=$f::missing required file"
              missing=$((missing+1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "::error::$missing required file(s) missing"
            exit 1
          fi
          echo "All ${#required[@]} required files present (manifest: .github/required-files.txt)."

      - name: Agents directory has expected files
        run: |
          set -e
          expected_agents=(
            "tdd-cycle-driver"
            "code-reviewer"
            "ddd-architect"
            "spring-boot-reviewer"
            "maven-build-doctor"
            "schema-analyst"
            "migration-author"
            "docs-keeper"
          )
          missing=0
          for a in "${expected_agents[@]}"; do
            if [ ! -e ".claude/agents/$a.md" ]; then
              echo "::error file=.claude/agents/$a.md::missing agent file"
              missing=$((missing+1))
            fi
          done
          [ "$missing" -eq 0 ] || exit 1
          echo "All expected agents present."

      - name: Hook scripts have shebang and are executable in git
        run: |
          set -e
          while IFS= read -r h; do
            head -1 "$h" | grep -q '^#!/usr/bin/env bash' || {
              echo "::error file=$h::missing bash shebang"
              exit 1
            }
            mode="$(git ls-files -s "$h" | awk '{print $1}')"
            if [ "$mode" != "100755" ]; then
              echo "::error file=$h::git mode is $mode, expected 100755 (chmod +x then commit)"
              exit 1
            fi
          done < <(find .claude/hooks -type f -name "*.sh")
          echo "All hook scripts have shebang + git +x bit."

      - name: settings.json + .mcp.json are valid JSON
        run: |
          python3 -c "import json; json.load(open('.claude/settings.json')); print('settings.json OK')"
          python3 -c "import json; json.load(open('.mcp.json')); print('.mcp.json OK')"

      - name: .gitignore protects secrets
        run: |
          set -e
          for pat in '\.env$' '\*\.key' '\*\.pem' 'id_rsa'; do
            grep -Eq "$pat" .gitignore || {
              echo "::error file=.gitignore::missing pattern matching $pat"
              exit 1
            }
          done
          echo ".gitignore covers .env / *.key / *.pem / id_rsa."

      - name: settings.local.json is NOT tracked (personal config)
        run: |
          if git ls-files --error-unmatch .claude/settings.local.json >/dev/null 2>&1; then
            echo "::error file=.claude/settings.local.json::personal config is tracked, run: git rm --cached .claude/settings.local.json"
            exit 1
          fi
          echo "settings.local.json correctly untracked."

      - name: AGENTS.md links resolve
        run: |
          set -e
          # Extract relative .claude/agents/*.md links from AGENTS.md and verify each exists
          mapfile -t links < <(grep -oE '\.claude/agents/[a-z-]+\.md' AGENTS.md | sort -u)
          missing=0
          for link in "${links[@]}"; do
            if [ ! -e "$link" ]; then
              echo "::error file=AGENTS.md::dangling link: $link"
              missing=$((missing+1))
            fi
          done
          [ "$missing" -eq 0 ] || exit 1
          echo "All AGENTS.md links resolve (${#links[@]} checked)."

      - name: .mcp.json variables are documented in .env.example
        run: |
          set -e
          mcp_vars=$(grep -oE '\$\{[A-Z_]+' .mcp.json | sed 's/\${//' | sort -u)
          missing=0
          for v in $mcp_vars; do
            if ! grep -q "^${v}=" .env.example; then
              echo "::error file=.env.example::missing variable: $v (referenced in .mcp.json)"
              missing=$((missing+1))
            fi
          done
          [ "$missing" -eq 0 ] || exit 1
          echo "All .mcp.json variables documented."

  bypass-guard:
    name: Reject BYPASS in PRs / push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: No BYPASS in commit messages on this branch
        run: |
          set -e
          # PR：检查所有 PR commit；push：检查 main 上新增 commit
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            range="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            range="HEAD~10..HEAD"
          fi
          if git log --format='%s%n%b' "$range" | grep -Eq '^BYPASS:|(CLAUDE_PLUGIN_)?HARNESS_BYPASS=1'; then
            echo "::error::Found commit with BYPASS marker in $range"
            git log --format='  %h %s' "$range" | grep -E 'BYPASS|HARNESS_BYPASS' || true
            echo "::error::HARNESS_BYPASS / CLAUDE_PLUGIN_HARNESS_BYPASS is for emergency local use only; remove the commit or revert before merging"
            exit 1
          fi
          echo "No BYPASS markers found in commit messages."
      - name: HARNESS_BYPASS env var must not be set in CI
        run: |
          for v in HARNESS_BYPASS CLAUDE_PLUGIN_HARNESS_BYPASS; do
            if [ -n "$(eval echo \"\${$v:-}\")" ]; then
              echo "::error::$v is set in CI environment — this should never happen"
              exit 1
            fi
          done
          echo "No bypass env vars set in CI ✅"

  hook-test:
    name: Pre-tool-use hook smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PyYAML (policy dispatcher dep)
        run: pip install pyyaml
      - name: Ensure hook + test are executable
        run: |
          chmod +x .claude/hooks/pre-tool-use.sh
          chmod +x .claude/hooks/subagent-stop.sh
          chmod +x .claude/hooks/tests/test_pre_tool_use.sh
          chmod +x .claude/hooks/tests/test_subagent_stop.sh
      - name: Validate policy yaml files parse
        run: |
          python -c "import yaml; [yaml.safe_load(open(f, encoding='utf-8')) for f in ['.claude/rules/policies/deny.yaml', '.claude/rules/policies/ask-user.yaml', '.claude/rules/policies/hints.yaml']]; print('All policy yaml files parse OK')"
      - name: Run pre-tool-use smoke test
        run: bash .claude/hooks/tests/test_pre_tool_use.sh
      - name: Run subagent-stop smoke test
        run: bash .claude/hooks/tests/test_subagent_stop.sh

  agent-schema-check:
    name: Agents document output schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Every agent .md contains schema example
        run: |
          set -e
          missing=0
          while IFS= read -r f; do
            if ! grep -q 'harness:agent-output' "$f"; then
              echo "::error file=$f::agent missing <!-- harness:agent-output --> schema example (see docs/agent-output-schema.md)"
              missing=$((missing+1))
            fi
          done < <(find .claude/agents -maxdepth 1 -type f -name "*.md")
          [ "$missing" -eq 0 ] || exit 1
          echo "All agents document the output schema."

  commit-lint:
    name: Conventional Commits format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check commit messages match Conventional Commits
        run: |
          set -e
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            range="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            range="HEAD~5..HEAD"
          fi
          # Regex: type(scope)?!?: subject  (allow Chinese subject)
          # Types: feat fix docs style refactor perf test build ci chore revert
          pattern='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([^)]+\))?!?:[[:space:]]+.+'
          bad=0
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            # Skip merge commits
            echo "$line" | grep -qE '^Merge ' && continue
            # Skip release commits
            echo "$line" | grep -qE '^Release ' && continue
            if ! echo "$line" | grep -Eq "$pattern"; then
              echo "::error::Non-conventional commit subject: $line"
              bad=$((bad+1))
            fi
          done < <(git log --format='%s' "$range")
          if [ "$bad" -gt 0 ]; then
            echo "::error::$bad commit(s) violate Conventional Commits in $range"
            echo "Expected: <type>(scope)?: subject  (types: feat fix docs style refactor perf test build ci chore revert)"
            exit 1
          fi
          echo "All commit messages match Conventional Commits."
