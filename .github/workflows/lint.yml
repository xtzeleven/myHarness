name: lint

on:
  push:
    branches: [main, plugin-branch]
  pull_request:
    branches: [main, plugin-branch]
  workflow_dispatch:

# 注：ADR-0006 实施后，原 .claude/{agents,commands,hooks,rules,scripts}/* 检查
# 已迁移到 .github/workflows/plugin-validate.yml（针对 plugin/）。本 workflow 保留:
#   - prettier 格式化
#   - 必需文件存在性（顶层 README/CLAUDE/AGENTS + .mcp.json + plugin manifest）
#   - secrets 防护（.gitignore + settings.local 不 tracked）
#   - bypass-guard（commit message 与 CI env）

jobs:
  format-check:
    name: Prettier format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install pinned prettier
        run: npm ci || npm install
      - name: Run prettier --check
        run: npm run format:check

  structure-check:
    name: Project structure sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Required files exist
        run: |
          set -e
          if [ ! -f .github/required-files.txt ]; then
            echo "::error file=.github/required-files.txt::manifest is missing"
            exit 1
          fi
          mapfile -t required < <(grep -vE '^\s*(#|$)' .github/required-files.txt)
          missing=0
          for f in "${required[@]}"; do
            if [ ! -e "$f" ]; then
              echo "::error file=$f::missing required file"
              missing=$((missing+1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "::error::$missing required file(s) missing"
            exit 1
          fi
          echo "All ${#required[@]} required files present (manifest: .github/required-files.txt)."

      - name: settings.json + .mcp.json are valid JSON
        run: |
          python3 -c "import json; json.load(open('.claude/settings.json')); print('.claude/settings.json OK')"
          python3 -c "import json; json.load(open('.mcp.json')); print('.mcp.json OK')"

      - name: .gitignore protects secrets
        run: |
          set -e
          for pat in '\.env$' '\*\.key' '\*\.pem' 'id_rsa'; do
            grep -Eq "$pat" .gitignore || {
              echo "::error file=.gitignore::missing pattern matching $pat"
              exit 1
            }
          done
          echo ".gitignore covers .env / *.key / *.pem / id_rsa."

      - name: settings.local.json is NOT tracked (personal config)
        run: |
          if git ls-files --error-unmatch .claude/settings.local.json >/dev/null 2>&1; then
            echo "::error file=.claude/settings.local.json::personal config is tracked, run: git rm --cached .claude/settings.local.json"
            exit 1
          fi
          echo "settings.local.json correctly untracked."

      - name: AGENTS.md links resolve (plugin/agents/*)
        run: |
          set -e
          # ADR-0006 后 AGENTS.md 应引用 plugin/agents/*.md
          mapfile -t links < <(grep -oE 'plugin/agents/[a-z-]+\.md' AGENTS.md | sort -u)
          missing=0
          for link in "${links[@]}"; do
            if [ ! -e "$link" ]; then
              echo "::error file=AGENTS.md::dangling link: $link"
              missing=$((missing+1))
            fi
          done
          [ "$missing" -eq 0 ] || exit 1
          echo "All AGENTS.md links resolve (${#links[@]} checked)."

      - name: .mcp.json variables are documented in .env.example
        run: |
          set -e
          mcp_vars=$(grep -oE '\$\{[A-Z_]+' .mcp.json | sed 's/\${//' | sort -u)
          missing=0
          for v in $mcp_vars; do
            if ! grep -q "^${v}=" .env.example; then
              echo "::error file=.env.example::missing variable: $v (referenced in .mcp.json)"
              missing=$((missing+1))
            fi
          done
          [ "$missing" -eq 0 ] || exit 1
          echo "All .mcp.json variables documented."

  bypass-guard:
    name: Reject BYPASS in PRs / push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: No BYPASS in commit messages on this branch
        run: |
          set -e
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            range="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            range="HEAD~10..HEAD"
          fi
          if git log --format='%s%n%b' "$range" | grep -Eq '^BYPASS:|(CLAUDE_PLUGIN_)?HARNESS_BYPASS=1'; then
            echo "::error::Found commit with BYPASS marker in $range"
            git log --format='  %h %s' "$range" | grep -E 'BYPASS|HARNESS_BYPASS' || true
            echo "::error::HARNESS_BYPASS / CLAUDE_PLUGIN_HARNESS_BYPASS is for emergency local use only; remove the commit or revert before merging"
            exit 1
          fi
          echo "No BYPASS markers found in commit messages."
      - name: HARNESS_BYPASS env var must not be set in CI
        run: |
          for v in HARNESS_BYPASS CLAUDE_PLUGIN_HARNESS_BYPASS; do
            if [ -n "$(eval echo \"\${$v:-}\")" ]; then
              echo "::error::$v is set in CI environment — this should never happen"
              exit 1
            fi
          done
          echo "No bypass env vars set in CI ✅"
