spring:
  application:
    name: harness-test
  # 测试环境同步排除全部 DB autoconfig：
  # - DataSource / TransactionManager / Flyway：与 main application.yml 一致
  # - MybatisPlusAutoConfiguration：新增 P2.3 OrderMapper / OrderPersistenceAdapter 后，
  #   若不排除，contextLoads 会因找不到 DataSource 而失败
  # 真集成测（testcontainers MySQL）应自带 @SpringBootTest 局部覆盖，不依赖本文件。
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
      - com.baomidou.mybatisplus.autoconfigure.MybatisPlusAutoConfiguration

logging:
  level:
    root: WARN
    com.example.harness: DEBUG
